<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LAAS Quality Reset Delta</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: #070a08;
        color: #e8eee9;
      }

      body {
        margin: 0;
        padding: 20px;
      }

      main {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      figure {
        margin: 0;
      }

      figcaption {
        margin-bottom: 8px;
        color: #a8d52a;
        font-size: 13px;
      }

      img {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        border: 1px solid #263028;
      }

      @media (max-width: 820px) {
        main {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <figure>
        <figcaption>Target</figcaption>
        <img src="./ravine-target.png" alt="Target forest ravine" />
      </figure>
      <figure>
        <figcaption>Current Quality Reset</figcaption>
        <img src="./current-quality-reset.png" alt="Current procedural ravine" />
      </figure>
    </main>
  </body>
</html>
